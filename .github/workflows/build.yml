name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Dependency audit
        run: bun audit
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - run: bun run test:ci

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run tests (Windows)
        run: bun run test:ci
        env:
          # Skip Linux-only tests on Windows
          KCODE_SKIP_PLATFORM_TESTS: "1"

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          - target: macos-x64
            os: macos-13
          - target: macos-arm64
            os: macos-14
          - target: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            bun build src/index.ts --compile --target=bun-linux-arm64 --minify --outfile release/kcode-${{ matrix.target }}
          else
            bun build src/index.ts --compile --minify --outfile release/kcode-${{ matrix.target }}
          fi

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path release
          bun build src/index.ts --compile --minify --outfile release/kcode-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcode-${{ matrix.target }}
          path: release/kcode-${{ matrix.target }}*

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/kcode-*; do
            target=$(basename "$dir")
            cp "$dir/$target" "release/$target"
            chmod +x "release/$target"
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
