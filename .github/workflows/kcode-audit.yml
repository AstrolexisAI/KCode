name: KCode Security Audit

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      path:
        description: 'Path to audit (default: repo root)'
        default: '.'
      max_files:
        description: 'Max files to scan'
        default: '500'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Audit (static-only)
        run: |
          bun run src/index.ts audit ${{ github.event.inputs.path || '.' }} \
            --skip-verify \
            --json \
            --max-files ${{ github.event.inputs.max_files || '500' }}

      - name: Check findings
        id: findings
        run: |
          if [ -f AUDIT_REPORT.json ]; then
            CONFIRMED=$(jq '.confirmed_findings' AUDIT_REPORT.json)
            echo "count=$CONFIRMED" >> $GITHUB_OUTPUT
            echo "Found $CONFIRMED candidates"
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.findings.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('AUDIT_REPORT.md', 'utf-8');
            const summary = report.split('## Findings')[0] || report.slice(0, 2000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 KCode Security Audit\n\n${summary}\n\n<details><summary>Full report</summary>\n\n${report}\n\n</details>\n\n---\n*Astrolexis.space — Kulvex Code*`
            });

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kcode-audit-report
          path: |
            AUDIT_REPORT.md
            AUDIT_REPORT.json
